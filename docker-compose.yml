version: "3.8"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: offroadtrip
      POSTGRES_USER: offroadtrip
      POSTGRES_PASSWORD: ${DB_PASSWORD:-offroadtrip_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offroadtrip"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://offroadtrip:${DB_PASSWORD:-offroadtrip_dev}@postgres:5432/offroadtrip
      SILK_GATEWAY_URL: ${SILK_GATEWAY_URL}
      SILK_GATEWAY_KEY: ${SILK_GATEWAY_KEY}
      QQ_MAP_KEY: ${QQ_MAP_KEY}
      QWEATHER_KEY: ${QWEATHER_KEY}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY}
      DEBUG: "false"
      CORS_ORIGINS: "http://localhost,http://localhost:5173"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ── Frontend (Vue3 + nginx) ──
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
